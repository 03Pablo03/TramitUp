services:
  - type: web
    name: tramitup-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_DOCUMENT
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: alertas@tramitup.com
      - key: ALERTS_FROM_NAME
        value: Tramitup Alertas
      - key: FRONTEND_URL
        sync: false
      - key: ENVIRONMENT
        value: production
